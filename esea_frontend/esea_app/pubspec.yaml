name: esea_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  device_preview: ^1.2.0

  # State Management
  provider: ^6.1.2

  # Networking
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI Components
  cached_network_image: ^3.4.1
  qr_flutter: ^4.1.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.20.0
  url_launcher: ^6.2.2
  image_picker: ^1.0.4
  timeago: ^3.6.0

  # ✅ FIXED (ONLY THIS LINE NEEDED)
  mobile_scanner: ^3.5.6

  # Icons
  cupertino_icons: ^1.0.6

  flutter_secure_storage: ^9.2.2
  app_links: ^7.0.0

  # PDF
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.2

  # Firebase
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  sentry_flutter: ^8.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.3
  flutter_local_notifications: ^17.0.0

# ==================================================
# SPLASH SCREEN CONFIG (MUST BE OUTSIDE DEPENDENCIES)
# ==================================================
flutter_native_splash:
  color: "#BDD1F2"
  image: assets/images/splash_logo.png

  android: true
  ios: true

  android_12:
    color: "#BDD1F2"
    image: assets/images/splash_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/splash_logo.png
    - assets/images/esea_logo.png
    - assets/images/iitb_logo.png
    - assets/images/eco.png
    - assets/images/leaf_pattern.png
    - assets/images/research.png
    - assets/images/newsletter.png
    - assets/images/internship.png
    - assets/images/course_material.png

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
